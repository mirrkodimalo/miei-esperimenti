function persona() { 
	this.nome = "";
	this.cognome = "";
	this.indirizzo = "";
	this.email = "";
	this.mostraNomeCompleto = function() {
        return this.nome + " " + this.cognome + " " + this.indirizzo + " " + this.email;
    };
	this.calcolaCodiceFiscale = function() {
        // Semplice calcolo del codice fiscale (non completo)
        const nomePart = this.nome.substring(0, 3).toUpperCase();
        const cognomePart = this.cognome.substring(0, 3).toUpperCase();
        const indirizzoPart = this.indirizzo.replace(/\s/g, '').substring(0, 3).toUpperCase();
        return cognomePart + nomePart + indirizzoPart;
    };
 }
