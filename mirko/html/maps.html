<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Navigatore Satellitare Ibrido</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            height: 100vh; 
            background: #000; 
            color: #fff; 
            overflow: hidden; 
            display: flex;
            flex-direction: column;
        }

        #map { flex-grow: 1; width: 100%; z-index: 1; background: #000; }

        .status-header {
            background: #111;
            padding: 10px;
            text-align: center;
            font-size: 12px;
            font-weight: bold;
            border-bottom: 1px solid #00ff88;
            z-index: 100;
            letter-spacing: 1px;
        }

        #street-view-container {
            position: absolute;
            top: 55px;
            left: 5%;
            width: 90%;
            height: 28%;
            border: 2px solid #00ff88;
            border-radius: 10px;
            z-index: 2000;
            display: none;
            background: #000;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        #street-view-container iframe { width: 100%; height: 100%; border: none; }

        .mobile-controls {
            background: #111;
            padding: 15px;
            border-top: 1px solid #333;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .btn-action {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 6px;
            background: #00ff88;
            color: #000;
            font-size: 14px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .btn-action:disabled { background: #222; color: #555; }

        .info-box {
            background: rgba(255, 255, 255, 0.03);
            padding: 8px;
            border-radius: 4px;
            font-size: 11px;
            text-align: center;
            border: 1px solid #222;
            color: #aaa;
        }

        /* Effetto visivo per rendere le strade meno invasive */
        .layer-roads { opacity: 0.4; filter: contrast(0.8); }
        .layer-labels { filter: drop-shadow(0px 0px 2px black); }
    </style>
</head>
<body>

    <div class="status-header" id="status-text">TOCCA IL PUNTO DI PARTENZA</div>

    <div id="map">
        <div id="street-view-container">
            <button onclick="this.parentElement.style.display='none'" style="position:absolute; top:8px; right:8px; background:#ff4444; color:white; border:none; border-radius:50%; width:28px; height:28px; font-weight:bold; z-index:2001; cursor:pointer;">X</button>
            <iframe id="sv-frame" src=""></iframe>
        </div>
    </div>
    
    <div class="mobile-controls">
        <div id="route-info" class="info-box">Seleziona due punti sulla mappa</div>
        <button id="btnConfirm" class="btn-action" disabled onclick="calcolaPercorso()">Calcola Percorso</button>
        <div style="text-align:center; font-size:9px; color:#444; margin-top:5px;" onclick="location.reload()">REIMPOSTA MAPPA</div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

    <script>
        let puntoA = null, puntoB = null;
        let markerA = null, markerB = null;
        let routing = null;

        const map = L.map('map', { 
            zoomControl: false, 
            attributionControl: false,
            maxZoom: 19 
        }).setView([42.0, 12.5], 5);

        // LIVELLO 1: SATELLITE (Base)
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

        // LIVELLO 2: STRADE (Sottili e semitrasparenti)
        const roads = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Transportation/MapServer/tile/{z}/{y}/{x}', {
            className: 'layer-roads'
        }).addTo(map);

        // LIVELLO 3: ETICHETTE (Nomi città, stati, fiumi e mari - sempre visibili)
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', {
            className: 'layer-labels'
        }).addTo(map);

        map.on('click', function(e) {
            if (!puntoA) {
                puntoA = e.latlng;
                markerA = L.marker(puntoA, { icon: L.divIcon({ className: 'pA', html: "<div style='background:#00ff88; width:12px; height:12px; border-radius:50%; border:2px solid white;'></div>" }) }).addTo(map);
                document.getElementById('status-text').innerText = "TOCCA LA DESTINAZIONE";
                document.getElementById('route-info').innerText = "Partenza confermata";
            } else if (!puntoB) {
                puntoB = e.latlng;
                markerB = L.marker(puntoB).addTo(map);
                
                const svFrame = document.getElementById('sv-frame');
                svFrame.src = `https://www.google.com/maps/embed/v1/streetview?key=YOUR_API_KEY&location=${puntoB.lat},${puntoB.lng}`; // Nota: Richiede API key per StreetView reale, qui uso fallback:
                svFrame.src = `https://maps.google.com/maps?q=${puntoB.lat},${puntoB.lng}&layer=c&output=embed`;
                
                document.getElementById('street-view-container').style.display = 'block';
                document.getElementById('btnConfirm').disabled = false;
                document.getElementById('status-text').innerText = "PRONTO AL CALCOLO";
            }
        });

        function calcolaPercorso() {
            if (!puntoA || !puntoB) return;
            if (routing) map.removeControl(routing);
            document.getElementById('street-view-container').style.display = 'none';

            routing = L.Routing.control({
                waypoints: [L.latLng(puntoA), L.latLng(puntoB)],
                createMarker: function() { return null; },
                lineOptions: { styles: [{ color: '#00ff88', weight: 4, opacity: 0.8 }] }, // Linea percorso sottile
                show: false
            }).on('routesfound', function(e) {
                const r = e.routes[0];
                const dist = (r.summary.totalDistance / 1000).toFixed(1);
                document.getElementById('route-info').innerText = "DISTANZA STRADALE: " + dist + " KM";
                map.fitBounds([puntoA, puntoB], { padding: [40, 40] });
            }).on('routingerror', function() {
                attivaNave();
            }).addTo(map);
        }

        function attivaNave() {
            if (routing) map.removeControl(routing);
            const dist = (map.distance(puntoA, puntoB) / 1000).toFixed(1);
            
            routing = L.Routing.control({
                waypoints: [L.latLng(puntoA), L.latLng(puntoB)],
                router: L.Routing.line({styles: [{color: '#00fbff', weight: 4, dashArray: '8,10'}]}),
                createMarker: function() { return null; },
                show: false
            }).addTo(map);

            document.getElementById('route-info').innerHTML = "<span style='color:#00fbff'>ROTTA NAVE: " + dist + " KM</span>";
            map.fitBounds([puntoA, puntoB], { padding: [40, 40] });
        }
    </script>
</body>
</html>
